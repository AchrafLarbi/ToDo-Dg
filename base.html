<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestion des Taches</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">Gestion des Taches</div>
  <div class="navbar-links">
    <a href="{{ url_for('dashboard') }}">Tableau de bord</a>
    <a href="{{ url_for('projets') }}">Projets</a>
    <a href="{{ url_for('taches') }}">Taches</a>
    <a href="{{ url_for('collaborateurs') }}">Collaborateurs</a>
    <a href="{{ url_for('parametres') }}">Parametres</a>
  </div>
</nav>
<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
