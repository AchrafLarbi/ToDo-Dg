databases:
  - name: gestion-taches-db
    plan: free
    databaseName: gestion_taches
    user: gestion_taches

services:
  - type: web
    name: gestion-taches
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'app:create_app()'"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestion-taches-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
